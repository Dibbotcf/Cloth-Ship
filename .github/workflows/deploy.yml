name: Deploy to Oracle VM

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Copy static files into standalone
        run: |
          cp -r .next/static .next/standalone/.next/static
          mkdir -p .next/standalone/public
          cp -r public/. .next/standalone/public/

      - name: Upload build to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: ".next/standalone"
          target: "~/deploy-tmp"
          rm: true

      - name: Restart app on server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Stop old process FIRST before touching files (prevents dual-process OOM)
            pm2 delete cloth-ship 2>/dev/null || true
            sleep 2

            # Swap in new build
            rm -rf ~/Cloth-Ship
            mv ~/deploy-tmp/.next/standalone ~/Cloth-Ship
            rm -rf ~/deploy-tmp

            # Restore .env
            [ -f ~/.cloth-ship.env ] && cp ~/.cloth-ship.env ~/Cloth-Ship/.env

            cd ~/Cloth-Ship
            PORT=3000 pm2 start server.js --name "cloth-ship"
            pm2 save
